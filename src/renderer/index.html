<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
    <title>Pet Context Companion</title>
    <link rel="stylesheet" href="../../node_modules/@fontsource-variable/inter/wght.css" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="../../node_modules/lucide/dist/umd/lucide.js"></script>
    <script defer src="renderer.js"></script>
  </head>
  <body>
    <main class="companion" aria-live="polite">
      <button id="view-toggle" class="lightbulb-btn" type="button" aria-label="Show all tasks" aria-pressed="false" title="Show all tasks">
        <i data-lucide="lightbulb" aria-hidden="true"></i>
      </button>
      <i data-lucide="sparkles" class="dream-sparkle dream-sparkle--one" aria-hidden="true"></i>
      <i data-lucide="star" class="dream-sparkle dream-sparkle--two" aria-hidden="true"></i>

      <section id="grid-stage" class="grid-stage" hidden aria-label="All tasks"></section>

      <section id="cloud-stage" class="cloud-stage" aria-label="Repository thought cloud">
        <i data-lucide="message-circle" class="thought-tail thought-tail--large" aria-hidden="true"></i>
        <i data-lucide="circle" class="thought-tail thought-tail--small" aria-hidden="true"></i>
        <section id="back-cloud" class="cloud cloud--back" aria-hidden="true"></section>
        <section id="front-cloud" class="cloud cloud--front" aria-label="Visible repository thoughts"></section>
      </section>

      <section id="usage-podium" class="usage-podium" aria-label="Codex usage limits">
        <header class="podium-header">
          <span>CODEX USAGE</span>
          <span id="plan-label">ACCOUNT</span>
        </header>
        <div id="quota-rows" class="quota-rows"></div>
        <footer class="podium-footer">
          <span><i data-lucide="bot" aria-hidden="true"></i><strong id="agent-count">0</strong> agents</span>
          <span><i data-lucide="rotate-ccw" aria-hidden="true"></i><strong id="reset-count">N/A</strong> reset credits</span>
        </footer>
      </section>
    </main>
  </body>
</html>
